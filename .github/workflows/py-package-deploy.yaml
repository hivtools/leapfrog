name: Build and upload Python package to PyPI

on:
  workflow_call:
    inputs:
      package_dir:
        required: true
        type: string
      pypi_package_name:
        required: true
        type: string
      pypi_environment:
        required: false
        type: string
        default: pypi

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an intel runner, macos-14 is apple silicon
        # We could add other ARM builds here if we need them
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v6

      - name: Generate C++ headers
        uses: ./.github/actions/setup

      # Used to host cibuildwheel
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.2.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse ${{ inputs.package_dir }}

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate C++ headers
        uses: ./.github/actions/setup

      - name: Build sdist
        run: pipx run build --sdist ${{ inputs.package_dir }}

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: ${{ inputs.package_dir }}/dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.pypi_environment }}
      url: https://pypi.org/p/${{ inputs.pypi_package_name }}
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
